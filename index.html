<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Oversight Experiment</title>
    <style>
      :root {
        --bg: #eef2ff;
        --panel: #ffffff;
        --ink: #101828;
        --muted: #667085;
        --line: #d0d5dd;
        --accent: #0b56d2;
        --accent-dark: #0945a4;
        --danger: #b42318;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(11, 86, 210, 0.14), transparent 32%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
      }

      main {
        width: min(100%, 560px);
        padding: 36px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.95rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 52px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        font: inherit;
        color: var(--ink);
      }

      input:focus {
        outline: 2px solid rgba(11, 86, 210, 0.18);
        border-color: var(--accent);
      }

      button {
        margin-top: 16px;
        min-height: 48px;
        padding: 0 18px;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .status {
        min-height: 24px;
        margin-top: 14px;
        font-size: 0.95rem;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--accent-dark);
      }

      code {
        padding: 0.15rem 0.35rem;
        border-radius: 6px;
        background: #f2f4f7;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Start Experiment</h1>
      <p>
        Enter a participant ID to open the assigned step 1 page for that participant.
      </p>

      <form id="pid-form">
        <label for="pid-input">Participant ID</label>
        <input
          id="pid-input"
          name="pid"
          type="text"
          placeholder="Example: P001"
          autocomplete="off"
          required
        />
        <button id="submit-button" type="submit">Start</button>
        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </main>

    <script>
      const CONFIG_PATH = "./data/experiment-config.csv";
      const form = document.querySelector("#pid-form");
      const pidInput = document.querySelector("#pid-input");
      const submitButton = document.querySelector("#submit-button");
      const status = document.querySelector("#status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const pid = pidInput.value.trim().toUpperCase();
        if (!pid) {
          renderStatus("Please enter a participant ID.", "error");
          return;
        }

        setLoading(true);
        renderStatus("Loading participant configuration...", "");

        try {
          const rows = await loadCsvRows(CONFIG_PATH);
          const match = rows.find((row) => row.pid === pid);

          if (!match) {
            renderStatus(`No configuration found for PID "${pid}".`, "error");
            setLoading(false);
            return;
          }

          const firstPage = match.step_1_page;
          if (!firstPage) {
            renderStatus(`PID "${pid}" is missing a step_1_page value.`, "error");
            setLoading(false);
            return;
          }

          renderStatus(`Redirecting ${pid} to step 1...`, "success");
          const nextUrl = `./pages/${encodeURIComponent(firstPage)}/?pid=${encodeURIComponent(pid)}&step=1`;
          window.location.href = nextUrl;
        } catch (error) {
          renderStatus(`Unable to load participant config: ${error.message}`, "error");
          setLoading(false);
        }
      });

      function setLoading(isLoading) {
        submitButton.disabled = isLoading;
        submitButton.textContent = isLoading ? "Loading..." : "Start";
      }

      function renderStatus(message, tone) {
        status.textContent = message;
        status.className = tone ? `status ${tone}` : "status";
      }

      async function loadCsvRows(path) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load ${path}.`);
        }

        const text = await response.text();
        return parseCsv(text);
      }

      function parseCsv(text) {
        const records = [];
        let currentField = "";
        let currentRow = [];
        let inQuotes = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const nextChar = text[index + 1];

          if (char === '"') {
            if (inQuotes && nextChar === '"') {
              currentField += '"';
              index += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            currentRow.push(currentField.trim());
            currentField = "";
            continue;
          }

          if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && nextChar === "\n") {
              index += 1;
            }
            currentRow.push(currentField.trim());
            currentField = "";
            if (currentRow.some((field) => field.length > 0)) {
              records.push(currentRow);
            }
            currentRow = [];
            continue;
          }

          currentField += char;
        }

        if (currentField || currentRow.length) {
          currentRow.push(currentField.trim());
          if (currentRow.some((field) => field.length > 0)) {
            records.push(currentRow);
          }
        }

        if (!records.length) {
          return [];
        }

        const [headers, ...rows] = records;
        return rows.map((row) =>
          headers.reduce((result, header, columnIndex) => {
            result[header] = row[columnIndex] ?? "";
            return result;
          }, {}),
        );
      }
    </script>
  </body>
</html>
